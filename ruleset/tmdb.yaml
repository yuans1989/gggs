# 一、影视综合类 (优先级最高，覆盖最广)
payload:
  # The Movie Database (TMDb) - 全球最通用的影视数据库，免费且覆盖广
  - DOMAIN-SUFFIX,themoviedb.org          # 主站 
  - DOMAIN-SUFFIX,tmdb.org                 # 短域名 
  - DOMAIN-SUFFIX,api.themoviedb.org       # API接口 
  - DOMAIN-SUFFIX,image.tmdb.org           # 图片服务器 
  - DOMAIN-SUFFIX,www.themoviedb.org       # 网站首页
  - DOMAIN-SUFFIX,media.themoviedb.org # 开发者文档
  - DOMAIN-SUFFIX,developer.themoviedb.org # 开发者文档
  - DOMAIN-SUFFIX,assets.themoviedb.org    # 静态资源
  - DOMAIN-SUFFIX,files.tmdb.org           # 文件资源

  # TheTVDB - 欧美剧集专业数据库，老剧信息详细 
  - DOMAIN-SUFFIX,thetvdb.com
  - DOMAIN-SUFFIX,api.thetvdb.com          # API接口

