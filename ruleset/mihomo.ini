; ============================================================
; 极简外部依赖版 - 无 DNS 配置，使用系统 DNS
; ============================================================
[custom]

enable_rule_generator = true
overwrite_original_rules = true

exclude = 流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Expire|Official|Website

; ============================================================
; 规则集（尽量使用 geosite/geoip，减少外部链接）
; ============================================================

; --- 1. 广告拦截 ---
ruleset = ⛔ 拦截,geosite:ads

; --- 2. 私有网络 ---
ruleset = 🏠 私有网络,geosite:private
ruleset = 🏠 私有网络,geoip:private,no-resolve

; --- 3. Cloudflare ---
ruleset = ☁️ Cloudflare,geosite:cloudflare

; --- 4. 小米（无内置替代，保留外部链接） ---
ruleset = 💊 小米,clash-domain:https://raw.githubusercontent.com/LM-Firefly/Rules/master/Domestic-Services/Xiaomi.list,86400

; --- 5. 苹果 ---
ruleset = 🍎 苹果,geosite:apple

; --- 6. 谷歌 ---
ruleset = 🔍 谷歌,geosite:google
ruleset = 🔍 谷歌,geoip:google,no-resolve

; --- 7. 游戏（使用内置 geosite） ---
ruleset = 🎮 游戏,geosite:steam
ruleset = 🎮 游戏,geosite:epic
ruleset = 🎮 游戏,geosite:ea
ruleset = 🎮 游戏,geosite:blizzard
ruleset = 🎮 游戏,geosite:ubi
ruleset = 🎮 游戏,geosite:playstation
ruleset = 🎮 游戏,geosite:nintendo
ruleset = 🎮 游戏,geosite:category-games

; --- 8. 国内通用直连 ---
ruleset = 🔗 直连,geosite:cn
ruleset = 🔗 直连,geoip:cn,no-resolve

; --- 9. 人工智能 ---
ruleset = 🧠 人工智能,geosite:openai
ruleset = 🧠 人工智能,geosite:claude
ruleset = 🧠 人工智能,geosite:perplexity
ruleset = 🧠 人工智能,geosite:ai

; --- 10. 开发平台 ---
ruleset = 📦 开发平台,geosite:github

; --- 11. 电报 ---
ruleset = 📨 电报,geosite:telegram
ruleset = 📨 电报,geoip:telegram,no-resolve

; --- 12. 社交媒体 ---
ruleset = 🌐 社交媒体,geosite:facebook
ruleset = 🐦 推特,geosite:x
ruleset = 💬 即时通讯,geosite:whatsapp
ruleset = 💬 即时通讯,geosite:wechat

; --- 13. 照片墙 ---
ruleset = 📸 照片墙,geosite:instagram

; --- 14. 流媒体 ---
ruleset = 🎬 视频,geosite:youtube
ruleset = 🎥 奈飞,geosite:netflix
ruleset = 🎥 奈飞,geoip:netflix,no-resolve
ruleset = 📺 迪士尼,geosite:disney
ruleset = 🎵 声田,geosite:spotify
ruleset = 🎶 抖声,geosite:tiktok
ruleset = 🎬 视频,geosite:primevideo
ruleset = 🍎 苹果,geosite:appletv
ruleset = 📺 迪士尼,geosite:hbo
ruleset = 🎬 视频,geosite:media

; --- 15. 加密 & 购物 ---
ruleset = 🛒 购物,geosite:amazon
ruleset = 🔐 加密,geosite:okx
ruleset = 🔐 加密,geosite:bybit
ruleset = 🔐 加密,geosite:binance

; --- 16. 防火墙 & 远端 ---
ruleset = 🛰 远端,geosite:gfw

; --- 17. 最终兜底 ---
ruleset = 🧯 兜底,FINAL


; ============================================================
; 策略组定义（同前，保持不变）
; ============================================================

; ---------- 基础行为 ----------
custom_proxy_group = 🔗 直连`select`[]DIRECT
custom_proxy_group = ⛔ 拦截`select`[]REJECT
custom_proxy_group = 🏠 私有网络`select`[]DIRECT
custom_proxy_group = 🚫 手动拒绝`select`[]REJECT

; ---------- 节点选择方式 ----------
custom_proxy_group = 🧭 手动`select`.*
custom_proxy_group = ♻️ 自动`url-test`.*`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group = 🧠 智能`smart`.*`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group = 🛫 出口流量`url-test`.*`https://www.gstatic.com/generate_204`300,,50

; ---------- 负载均衡与故障转移 ----------
custom_proxy_group = ⚖️ 负载均衡`load-balance`.*(SG|JP|HK|US|TW|GB)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group = 🔄 故障转移`fallback`.*(SG|JP|HK|US|TW|GB)`https://www.gstatic.com/generate_204`300,,50

; ---------- 地区节点池 ----------
custom_proxy_group = 🇭🇰 香港`url-test`(?i)(香港|\\bHK\\b|hongkong|hong kong)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group = 🇹🇼 台湾`url-test`(?i)(台湾|台灣|\\bTW\\b|taiwan|taipei)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group = 🇯🇵 日本`url-test`(?i)(日本|\\bJP\\b|tokyo|osaka)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group = 🇸🇬 新加坡`url-test`(?i)(新加坡|\\bSG\\b|singapore)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group = 🇰🇷 韩国`url-test`(?i)(韩国|韓國|\\bKR\\b|seoul|chuncheon)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group = 🇺🇸 美国`url-test`(?i)(美国|\\bUS\\b|united states|los angeles|san jose|seattle|new york|portland|dallas|phoenix|chicago)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group = 🇬🇧 英国`url-test`(?i)(英国|\\bUK\\b|united kingdom|london|manchester|edinburgh)`https://www.gstatic.com/generate_204`300,,50

; ---------- 远端/冷门节点 ----------
custom_proxy_group = 🛰 远端`select`(?i)^(?!.*(hk|hongkong|tw|taiwan|jp|tokyo|osaka|sg|singapore|kr|seoul|us|united states|los angeles|san jose|seattle|new york|uk|london|德国|法国|加拿大|印度|巴西|澳大利亚|新西兰|马来西亚|泰国|越南|菲律宾|印尼)).*

; ---------- Cloudflare ----------
custom_proxy_group = ☁️ Cloudflare`select`[]DIRECT`[]🧭 手动`[]♻️ 自动`[]🧠 智能`[]⚖️ 负载均衡`[]🔄 故障转移`[]🇭🇰 香港`[]🇹🇼 台湾`[]🇯🇵 日本`[]🇸🇬 新加坡`[]🇰🇷 韩国`[]🇺🇸 美国`[]🇬🇧 英国`[]🛰 远端`[]⛔ 拦截

; ---------- 特殊用途 ----------
custom_proxy_group = 🔀 特殊流量`select`[]DIRECT`[]🚀 代理

; ---------- 服务分类策略组 ----------
%common% = `[]🔗 直连` `[]⛔ 拦截` `[]🚫 手动拒绝` `[]🧭 手动` `[]♻️ 自动` `[]🧠 智能` `[]⚖️ 负载均衡` `[]🔄 故障转移` `[]🇭🇰 香港` `[]🇹🇼 台湾` `[]🇯🇵 日本` `[]🇸🇬 新加坡` `[]🇰🇷 韩国` `[]🇺🇸 美国` `[]🇬🇧 英国` `[]🛰 远端` `[]☁️ Cloudflare`

custom_proxy_group = 🚀 代理`select`[]DIRECT`[]🧭 手动`[]♻️ 自动`[]🧠 智能`[]⚖️ 负载均衡`[]🔄 故障转移`[]🇭🇰 香港`[]🇹🇼 台湾`[]🇯🇵 日本`[]🇸🇬 新加坡`[]🇰🇷 韩国`[]🇺🇸 美国`[]🇬🇧 英国`[]🛰 远端`[]⛔ 拦截

