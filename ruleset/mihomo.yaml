proxy-providers:
  Cloudflare:
    url: "https://gggq.pages.dev/sub?token=ce31ddba8be3281155385b513d7e5d6d&clash"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 🔗直连

proxies:
  - {name: 🔗直连, type: direct}
  - {name: 🚫拒绝, type: reject}

port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895

allow-lan: true
mode: rule
log-level: info

external-controller: 0.0.0.0:9090
external-ui: ui
secret: "116383926"

dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.20.0.1/16
  nameserver:
    - 223.5.5.5
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - +.lan
    - +.local
    - geosite:cn
ipv6: true

# ============================================================
#  5. TUN 透明代理
# ============================================================
tun:
  enable: true
  stack: gvisor
  device: utun
  endpoint-independent-nat: true
  auto-route: false
  auto-detect-interface: false
  auto-redirect: false
  strict-route: false

profile:
  store-selected: true
  store-fake-ip: true

# ============================================================
#  6. 策略组定义
# ============================================================
default: &default
  type: select
  proxies:
    - 🔗直连
    - ⚡自动
    - ✋手动
    - 🇭🇰香港
    - 🇹🇼台湾
    - 🇯🇵日本
    - 🇸🇬新加坡
    - 🇰🇷韩国
    - 🇺🇸美国
    - 🇬🇧英国
    - 🌐其他
    - 🚫拒绝

proxy-groups:
  - {name: 🚫广告拦截, type: select, proxies: [🚫拒绝, 🔗直连]}
  - {name: 💊小米, <<: *default}
  - {name: 🤖 ChatGPT, <<: *default}
  - {name: 🧠 Claude, <<: *default}
  - {name: 🔮 Meta AI, <<: *default}
  - {name: 🔍 Perplexity, <<: *default}
  - {name: 🐙 GitHub, <<: *default}
  - {name: ✈️ Telegram, <<: *default}
  - {name: 🐦 Twitter(X), <<: *default}
  - {name: 💬 WhatsApp, <<: *default}
  - {name: 👍 Facebook, <<: *default}
  - {name: 🎮 Steam, <<: *default}
  - {name: 🕹️ Game, <<: *default}
  - {name: ▶️ YouTube, <<: *default}
  - {name: 🎵 TikTok, <<: *default}
  - {name: 🏰 Disney, <<: *default}
  - {name: 🎬 Netflix, <<: *default}
  - {name: 📺 HBO, <<: *default}
  - {name: 🎧 Spotify, <<: *default}
  - {name: 💰 Crypto, <<: *default}
  - {name: 🛒 Amazon, <<: *default}
  - {name: 🍎 Apple, <<: *default}
  - {name: 🖥️ Microsoft, <<: *default}
  - {name: 🌐 Google, <<: *default}
  - {name: 🧪 Check, <<: *default}
  - {name: 🌍国外, <<: *default}
  - {name: 🇨🇳国内, <<: *default}
  - {name: 📦其他, <<: *default}

  # ----- 手动选择所有节点（排除直连和拒绝） -----
  - name: ✋手动
    type: select
    include-all: true
    filter: "^((?!(🔗直连|🚫拒绝)).)*$"

  # ----- 自动选择所有地区的最快节点 -----
  - name: ⚡自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "^((?!(🔗直连|🚫拒绝)).)*$"

  # ----- 各地区自动选择 -----
  - name: 🇭🇰香港
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"

  - name: 🇹🇼台湾
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)).*$"

  - name: 🇯🇵日本
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"

  - name: 🇸🇬新加坡
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$"

  - name: 🇰🇷韩国
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea)).*$"

  - name: 🇺🇸美国
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$"

  - name: 🇬🇧英国
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(英国|UK|伦敦|Manchester|Edinburgh|🇬🇧|United Kingdom|Britain)).*$"

  # ----- 其他地区 -----
  - name: 🌐其他
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "^((?!(🔗直连|🚫拒绝|广港|香港|HK|Hong Kong|🇭🇰|HongKong|广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan|广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan|广新|新加坡|SG|坡|狮城|🇸🇬|Singapore|广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea|广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States|英国|UK|伦敦|Manchester|Edinburgh|🇬🇧|United Kingdom|Britain)).)*$"

# ============================================================
#  7. 规则引擎（rules）
# ============================================================
rules:
