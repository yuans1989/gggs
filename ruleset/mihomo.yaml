  - DOMAIN-KEYWORD,5ddd,🔗直连
  - DOMAIN-KEYWORD,fnnas,🔗直连
  - DOMAIN-KEYWORD,fnos,🔗直连
  - DOMAIN-KEYWORD,feiniu,🔗直连

  # ----- 私有网络 -----
  - RULE-SET,Private / IP,🔗直连
  - RULE-SET,Private / Domain,🔗直连

  # ----- 广告拦截 -----
  - RULE-SET,Ads / Domain,🚫广告拦截

  # ----- 小米服务 -----
