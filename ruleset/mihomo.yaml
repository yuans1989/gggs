  - RULE-SET,Disney / Domain,🏰 Disney
  - RULE-SET,Max / Domain,📺 HBO
  - RULE-SET,PrimeVideo / Domain,📺 HBO
  - RULE-SET,AppleTV / Domain,📺 HBO
  - RULE-SET,YouTube / Domain,▶️ YouTube
  - RULE-SET,TikTok / Domain,🎵 TikTok
